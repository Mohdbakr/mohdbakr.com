<!-- Floating dark/light mode toggle (bottom-left) -->
<div class="position-fixed start-0 ms-3 bd-mode-toggle"
    style="bottom:55px">
    <button
        class="btn btn-mode-toggle py-2 d-flex align-items-center"
        id="bd-theme" type="button"
        aria-label="Toggle theme">
        <i class="bi bi-circle-half theme-icon-active"></i>
        <span class="visually-hidden" id="bd-theme-text">Toggle theme</span>
    </button>
</div>

<script>
(function () {
  "use strict";

  // Icon classes for each mode
  const icons = { light: "bi-moon-stars-fill", dark: "bi-sun-fill" };

  // Detect current Quarto scheme: "alternate" = dark, default = light
  function getCurrentMode() {
    const sentinel = window.localStorage.getItem("quarto-color-scheme");
    // Quarto stores "alternate" for dark
    return sentinel === "alternate" ? "dark" : "light";
  }

  function showActiveMode() {
    var active = getCurrentMode();
    var btn = document.getElementById("bd-theme");
    if (!btn) return;
    var icon = btn.querySelector(".theme-icon-active");

    // Reset icon
    icon.className = "bi theme-icon-active";
    icon.classList.add(icons[active] || "bi-circle-half");
    btn.setAttribute("aria-label", active === "dark" ? "Switch to light mode" : "Switch to dark mode");
  }

  // Navbar scroll: transparent at top, solid when scrolled
  // Also swaps the logo between light/dark variants
  var LOGO_LIGHT_BG = "/assets/logos/logo_with_name_light.svg"; // dark ink, for light bg
  var LOGO_DARK_BG  = "/assets/logos/logo_with_name_dark.svg";  // light ink, for dark bg

  function isQuartoDarkMode() {
    return window.localStorage.getItem("quarto-color-scheme") === "alternate";
  }

  function handleNavbarScroll() {
    var navbar = document.querySelector(".navbar");
    if (!navbar) return;
    var scrolled = window.scrollY > 50;

    if (scrolled) {
      navbar.classList.add("scrolled");
    } else {
      navbar.classList.remove("scrolled");
    }

    // Swap logo: at top use variant matching page bg, scrolled always use light-ink
    var logo = navbar.querySelector(".navbar-logo");
    if (logo) {
      if (scrolled) {
        logo.src = LOGO_DARK_BG; // light ink on dark scrolled bg
      } else {
        logo.src = isQuartoDarkMode() ? LOGO_DARK_BG : LOGO_LIGHT_BG;
      }
    }
  }
  window.addEventListener("scroll", handleNavbarScroll, { passive: true });

  // Listen for click on toggle button
  document.addEventListener("DOMContentLoaded", function () {
    handleNavbarScroll(); // set initial state
    showActiveMode();

    var btn = document.getElementById("bd-theme");
    if (btn) {
      btn.addEventListener("click", function () {
        window.quartoToggleColorScheme();
        setTimeout(function() { showActiveMode(); handleNavbarScroll(); }, 50);
      });
    }

    // Also update when the navbar toggle is used
    var navToggle = document.querySelector(".quarto-color-scheme-toggle");
    if (navToggle) {
      navToggle.addEventListener("click", function () {
        setTimeout(function() { showActiveMode(); handleNavbarScroll(); }, 50);
      });
    }
  });
})();
</script>
