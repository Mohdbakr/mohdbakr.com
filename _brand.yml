meta:
  name: Mohamed Bakr
  license: MIT
  link:
    home: https://portfolio.mohdbakr.com
    github: https://github.com/Mohdbakr
    linkedin: https://www.linkedin.com/in/mohdbakr/

logo:
  images:

    small-light:
      path: assets/logos/logo_dark.svg
      alt: "Mohamed Bakr"
    small-dark:
      path: assets/logos/logo_light.svg
      alt: "Mohamed Bakr"
    light:
      path: assets/logos/logo_medium_dark.svg
      alt: "Mohamed Bakr"
    dark:
      path: assets/logos/logo_medium_light.svg
      alt: "Mohamed Bakr"
    large-light:
      path: assets/logos/logo_large_dark.svg
      alt: "Mohamed Bakr"
    large-dark:
      path: assets/logos/logo_large_light.svg
      alt: "Mohamed Bakr"
    full-light:
      path: assets/logos/logo_with_name_dark.svg
      alt: "Mohamed Bakr"
    full-dark:
      path: assets/logos/logo_with_name_light.svg
      alt: "Mohamed Bakr"
  small:
    light: small-light
    dark: small-dark
  medium:
    light: light
    dark: dark
  large:
    light: large-light
    dark: large-dark

color:
  palette:
    anvil-teal: "#0F766E"
    anvil-teal-light: "#2DD4BF"
    hammered-gold: "#A16207"
    hammered-gold-light: "#FBBF24"
    molten-crimson: "#991B1B"
    iron-slate: "#475569"
    copper-green: "#065F46"

    sponsor-color: "#2DD4BF"
    
  background:
    dark: "#333333"
    light: "#FAFAF9"
  foreground:
    dark: "#D6C8B8"
    light: "#352A26"
  dark:
    dark: "#333333"
    light: "#352A26"
  light:
    dark: "#D6C8B8"
    light: "#FAFAF9"
  primary:
    light: anvil-teal
    dark: anvil-teal-light
  secondary:
    light: hammered-gold
    dark: hammered-gold-light
  tertiary: molten-crimson
  success: copper-green
  info:
    light: anvil-teal
    dark: anvil-teal-light
  warning:
    light: hammered-gold
    dark: hammered-gold-light
  danger: molten-crimson
typography:
  fonts:
    - family: Poppins
      source: bunny
    - family: Lora
      source: bunny
    - family: JetBrains Mono
      source: bunny
    - family: Readex Pro
      source: bunny
    - family: Tajawal
      source: bunny
  base: Poppins
  headings: Lora
  monospace: JetBrains Mono
  link:
    color: 
      light: anvil-teal
      dark: anvil-teal-light


defaults:
  bootstrap:
    defaults:
      tooltip-color: $background
      tooltip-bg: $foreground
