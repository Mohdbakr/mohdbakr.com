project:
  type: website
  render:
    - "*.qmd"
    - "!docs/"

brand: _brand.yml

website:
  title: "Probability ML Foundations"

  navbar:
    pinned: true
    background: primary
    foreground: light
    logo: assets/logo.svg
    logo-alt: "Probability ML Foundations"
    logo-href: /
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: globe2
        menu:
          - text: "English"
            href: /
          - text: "العربية"
            href: /ar/

  sidebar:
    - id: lessons
      title: "Lessons"
      style: "docked"
      collapse-level: 1
      contents:
        - section: "English"
          contents:
            - text: "Week 1: Conditioning & Bayes"
              href: content/en/week-01-conditioning.qmd

  page-footer:
    left: "© 2026 Mohamed Bakr"
    center: "[![](/assets/quarto-logo.png){height=20px}](https://quarto.org) engine"
    right: |
      <a href="https://portfolio.mohdbakr.com" title="Portfolio" class="footer-icon"><i class="bi bi-globe2"></i></a>
      <a href="https://www.linkedin.com/in/mohdbakr/" title="LinkedIn" class="footer-icon"><i class="bi bi-linkedin"></i></a>
      <a href="https://github.com/Mohdbakr" title="GitHub" class="footer-icon"><i class="bi bi-github"></i></a>

format:
  html:
    theme:
      light: [flatly, styles/custom.scss]
      dark: [darkly, styles/custom.scss]
    toc: true